name: TestAgent CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run TestAgent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          ruff check .
          ruff format --check .

      - name: Run type checking
        run: mypy testagent/ --strict

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --timeout=60 --junitxml=reports/unit-results.xml --cov=testagent --cov-report=term-missing

      - name: Run integration tests
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          pytest tests/integration/ -v --timeout=120 --junitxml=reports/integration-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

      - name: TestAgent CI Run
        if: success()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          testagent ci --skill api_smoke_test --exit-code --junit reports/ci-results.xml --timeout 300

      - name: Upload TestAgent CI results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: reports/ci-results.xml
          retention-days: 30
